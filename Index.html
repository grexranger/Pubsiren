<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Politisirene">
  <title>Politisirene</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b0f;
      --panel: #0e1218;
      --border: #1a2230;
      --border-hi: #243040;
      --blue: #1a6fff;
      --blue-bright: #5ab0ff;
      --blue-flash: #00b4ff;
      --amber: #ffaa00;
      --green: #00dd66;
      --text: #b8c8d8;
      --text-dim: #3a4a5a;
      --btn-bg: #0e1520;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .lightbar {
      display: flex;
      height: 56px;
      background: #050709;
      border-bottom: 2px solid #0a1020;
      position: relative;
    }

    .lb-half {
      flex: 1;
      display: flex;
      gap: 3px;
      padding: 10px 6px;
      align-items: stretch;
    }

    .lb-pod {
      flex: 1;
      border-radius: 3px;
      background: #0a1525;
      border: 1px solid #0d1a30;
      transition: background 40ms, box-shadow 40ms, border-color 40ms;
    }

    .lb-pod.on-blue {
      background: var(--blue-flash);
      box-shadow: 0 0 14px 4px rgba(0,180,255,0.75), 0 0 28px 8px rgba(0,180,255,0.3);
      border-color: #90dcff;
    }

    .lb-center {
      width: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: #1a2a40;
      border-left: 1px solid #0a1520;
      border-right: 1px solid #0a1520;
    }

    .statusbar {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      background: #0a0e14;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .status-pill {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .status-pill.live {
      color: var(--blue-bright);
      border-color: var(--blue);
      background: rgba(26,111,255,0.08);
      box-shadow: 0 0 8px rgba(26,111,255,0.2);
    }

    .status-mode {
      flex: 1;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--amber);
    }

    .status-vol {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 14px;
      gap: 10px;
      overflow-y: auto;
    }

    .siren-btn {
      background: var(--btn-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 20px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .siren-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(26,111,255,0.18) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .siren-btn.on {
      border-color: var(--blue);
      background: #0a1828;
    }
    .siren-btn.on::after { opacity: 1; }

    .siren-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--text-dim);
      transition: color 0.15s;
      z-index: 1;
    }
    .siren-word {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 8px;
      line-height: 1;
      color: var(--text-dim);
      transition: color 0.15s, text-shadow 0.15s;
      z-index: 1;
    }
    .siren-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      transition: color 0.15s;
      z-index: 1;
    }

    .siren-btn.on .siren-eyebrow,
    .siren-btn.on .siren-sub { color: var(--blue-bright); }
    .siren-btn.on .siren-word {
      color: var(--blue-bright);
      text-shadow: 0 0 40px rgba(90,176,255,0.5), 0 0 80px rgba(90,176,255,0.2);
    }

    .sec-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 700;
      padding-left: 2px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .mode-btn {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 12px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: border-color 0.1s, background 0.1s;
      text-align: left;
    }
    .mode-btn.sel {
      border-color: var(--blue);
      background: #0a1828;
    }
