<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Politisirene">
  <title>Politisirene</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b0f;
      --panel: #0e1218;
      --border: #1a2230;
      --border-hi: #243040;
      --blue: #1a6fff;
      --blue-bright: #5ab0ff;
      --blue-flash: #00b4ff;
      --amber: #ffaa00;
      --green: #00dd66;
      --text: #b8c8d8;
      --text-dim: #3a4a5a;
      --btn-bg: #0e1520;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── LIGHTBAR ─────────────────── */
    .lightbar {
      display: flex;
      height: 56px;
      background: #050709;
      border-bottom: 2px solid #0a1020;
      position: relative;
    }

    .lb-half {
      flex: 1;
      display: flex;
      gap: 3px;
      padding: 10px 6px;
      align-items: stretch;
    }

    .lb-pod {
      flex: 1;
      border-radius: 3px;
      background: #0a1525;
      border: 1px solid #0d1a30;
      transition: background 40ms, box-shadow 40ms, border-color 40ms;
    }

    .lb-pod.on-blue {
      background: var(--blue-flash);
      box-shadow: 0 0 14px 4px rgba(0,180,255,0.75), 0 0 28px 8px rgba(0,180,255,0.3);
      border-color: #90dcff;
    }

    .lb-center {
      width: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: #1a2a40;
      border-left: 1px solid #0a1520;
      border-right: 1px solid #0a1520;
    }

    /* ── STATUS BAR ───────────────── */
    .statusbar {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      background: #0a0e14;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .status-pill {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .status-pill.live {
      color: var(--blue-bright);
      border-color: var(--blue);
      background: rgba(26,111,255,0.08);
      box-shadow: 0 0 8px rgba(26,111,255,0.2);
    }

    .status-mode {
      flex: 1;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--amber);
    }

    .status-vol {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
    }

    /* ── MAIN ─────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 14px;
      gap: 10px;
      overflow-y: auto;
    }

    /* ── SIREN TOGGLE ─────────────── */
    .siren-btn {
      background: var(--btn-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 20px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .siren-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(26,111,255,0.18) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .siren-btn.on {
      border-color: var(--blue);
      background: #0a1828;
    }
    .siren-btn.on::after { opacity: 1; }

    .siren-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--text-dim);
      transition: color 0.15s;
      z-index: 1;
    }
    .siren-word {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 8px;
      line-height: 1;
      color: var(--text-dim);
      transition: color 0.15s, text-shadow 0.15s;
      z-index: 1;
    }
    .siren-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      transition: color 0.15s;
      z-index: 1;
    }

    .siren-btn.on .siren-eyebrow,
    .siren-btn.on .siren-sub { color: var(--blue-bright); }
    .siren-btn.on .siren-word {
      color: var(--blue-bright);
      text-shadow: 0 0 40px rgba(90,176,255,0.5), 0 0 80px rgba(90,176,255,0.2);
    }

    /* ── SECTION LABEL ────────────── */
    .sec-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 700;
      padding-left: 2px;
    }

    /* ── MODE GRID ────────────────── */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .mode-btn {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 12px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: border-color 0.1s, background 0.1s;
      text-align: left;
    }
    .mode-btn.sel {
      border-color: var(--blue);
      background: #0a1828;
    }

    .mode-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.1s, box-shadow 0.1s;
      margin-bottom: 2px;
    }
    .mode-btn.sel .mode-dot {
      background: var(--blue-bright);
      box-shadow: 0 0 5px rgba(90,176,255,0.8);
    }

    .mode-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-dim);
      transition: color 0.1s;
    }
    .mode-btn.sel .mode-name { color: var(--blue-bright); }

    .mode-desc {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    /* ── BOTTOM ROW ───────────────── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    /* ── HORN ─────────────────────── */
    .horn-btn {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.08s, background 0.08s;
    }
    .horn-btn.pressed {
      border-color: var(--amber);
      background: #180e00;
    }
    .horn-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-dim);
      transition: color 0.08s;
    }
    .horn-btn.pressed .horn-name { color: var(--amber); }
    .horn-hint {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    /* ── VOLUME ───────────────────── */
    .vol-block {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vol-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .vol-lbl {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 700;
    }
    .vol-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--blue-bright);
      box-shadow: 0 0 6px rgba(90,176,255,0.6);
      cursor: pointer;
    }

    /* ── SCREEN FLASH ─────────────── */
    #flashVeil {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 200;
      background: rgba(0, 160, 255, 0.07);
      opacity: 0;
      transition: opacity 30ms;
    }
  </style>
</head>
<body>

<div id="flashVeil"></div>

<!-- LIGHTBAR -->
<div class="lightbar">
  <div class="lb-half" id="lbL">
    <div class="lb-pod" id="p0"></div>
    <div class="lb-pod" id="p1"></div>
    <div class="lb-pod" id="p2"></div>
    <div class="lb-pod" id="p3"></div>
    <div class="lb-pod" id="p4"></div>
  </div>
  <div class="lb-center">POLITIET</div>
  <div class="lb-half" id="lbR">
    <div class="lb-pod" id="p5"></div>
    <div class="lb-pod" id="p6"></div>
    <div class="lb-pod" id="p7"></div>
    <div class="lb-pod" id="p8"></div>
    <div class="lb-pod" id="p9"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-pill" id="sPill">STANDBY</div>
  <div class="status-mode" id="sMode">HI-LO</div>
  <div class="status-vol" id="sVol">VOL 80%</div>
</div>

<!-- MAIN -->
<div class="main">

  <button class="siren-btn" id="sirenBtn" onclick="toggleSiren()">
    <div class="siren-eyebrow">TRYK FOR AT AKTIVERE</div>
    <div class="siren-word">SIRENE</div>
    <div class="siren-sub" id="sirenSub">● INAKTIV</div>
  </button>

  <div class="sec-label">SIRENETYPE</div>
  <div class="mode-grid">
    <button class="mode-btn sel" data-mode="hilo" onclick="selectMode('hilo',this)">
      <div class="mode-dot"></div>
      <div class="mode-name">HI-LO</div>
      <div class="mode-desc">Europæisk to-tone</div>
    </button>
    <button class="mode-btn" data-mode="wail" onclick="selectMode('wail',this)">
      <div class="mode-dot"></div>
      <div class="mode-name">WAIL</div>
      <div class="mode-desc">Langsom sweep</div>
    </button>
    <button class="mode-btn" data-mode="yelp" onclick="selectMode('yelp',this)">
      <div class="mode-dot"></div>
      <div class="mode-name">YELP</div>
      <div class="mode-desc">Hurtig sweep</div>
    </button>
    <button class="mode-btn" data-mode="phaser" onclick="selectMode('phaser',this)">
      <div class="mode-dot"></div>
      <div class="mode-name">PHASER</div>
      <div class="mode-desc">FM-moduleret</div>
    </button>
  </div>

  <div class="bottom-row">
    <div>
      <div class="sec-label" style="margin-bottom:7px">HORN</div>
      <button class="horn-btn" id="hornBtn">
        <div class="horn-name">◼ HORN</div>
        <div class="horn-hint">HOLD INDE</div>
      </button>
    </div>
    <div>
      <div class="sec-label" style="margin-bottom:7px">LYDSTYRKE</div>
      <div class="vol-block">
        <div class="vol-top">
          <div class="vol-lbl">VOL</div>
          <div class="vol-val" id="volVal">80%</div>
        </div>
        <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
      </div>
    </div>
  </div>

</div>

<script>
// ── AUDIO ──────────────────────────────────────────────────
let ctx, masterGain;
let sirenNodes = [];
let hornNodes  = [];
let sirenOn    = false;
let hornOn     = false;
let curMode    = 'hilo';
let vol        = 0.8;
let animId     = null;
let hiloTimer  = null;

function ensureCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = vol;
    masterGain.connect(ctx.destination);
  }
  if (ctx.state === 'suspended') ctx.resume();
}

function killNodes(arr) {
  arr.forEach(n => { try { n.stop && n.stop(); n.disconnect(); } catch(e){} });
  arr.length = 0;
}

// ── SIREN MODES ────────────────────────────────────────────
function startSiren() {
  killNodes(sirenNodes);
  if (animId)    { cancelAnimationFrame(animId); animId = null; }
  if (hiloTimer) { clearInterval(hiloTimer); hiloTimer = null; }
  ensureCtx();
  ({ hilo: doHiLo, wail: doWail, yelp: doYelp, phaser: doPhaser }[curMode])();
}

function stopSiren() {
  killNodes(sirenNodes);
  if (animId)    { cancelAnimationFrame(animId); animId = null; }
  if (hiloTimer) { clearInterval(hiloTimer); hiloTimer = null; }
  lightsOff();
}

// HI-LO — alternating 580 / 970 Hz, 550 ms each
function doHiLo() {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  gain.gain.value = 0.55;
  osc.connect(gain); gain.connect(masterGain);

  const freqs = [970, 580];
  let step = 0, t = ctx.currentTime;
  for (let i = 0; i < 200; i++) {
    osc.frequency.setValueAtTime(freqs[i % 2], t);
    t += 0.55;
  }
  osc.start();
  sirenNodes.push(osc, gain);

  let phase = true;
  hiloTimer = setInterval(() => { flashLights(phase); phase = !phase; }, 550);
}

// WAIL — slow sine sweep 500→1400 Hz, 3 s
function doWail() {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth'; gain.gain.value = 0.5;
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); sirenNodes.push(osc, gain);

  let t0 = null;
  const period = 3000, lo = 500, hi = 1400;
  function tick(ts) {
    if (!t0) t0 = ts;
    const ph = ((ts - t0) % period) / period;
    osc.frequency.value = lo + (hi - lo) * (0.5 - 0.5 * Math.cos(ph * 2 * Math.PI));
    flashLights(ph < 0.5);
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

// YELP — fast sweep 700→1600 Hz, 220 ms
function doYelp() {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth'; gain.gain.value = 0.48;
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); sirenNodes.push(osc, gain);

  let t0 = null;
  const period = 220, lo = 700, hi = 1600;
  function tick(ts) {
    if (!t0) t0 = ts;
    const ph = ((ts - t0) % period) / period;
    osc.frequency.value = lo + (hi - lo) * (0.5 - 0.5 * Math.cos(ph * 2 * Math.PI));
    flashLights(ph < 0.5);
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

// PHASER — FM: carrier 900 Hz, LFO 3.5 Hz ±350 Hz
function doPhaser() {
  const car  = ctx.createOscillator();
  const lfo  = ctx.createOscillator();
  const lfoG = ctx.createGain();
  const gain = ctx.createGain();
  car.type = 'sawtooth'; car.frequency.value = 900;
  lfo.type = 'sine';     lfo.frequency.value  = 3.5;
  lfoG.gain.value = 350; gain.gain.value = 0.48;
  lfo.connect(lfoG); lfoG.connect(car.frequency);
  car.connect(gain); gain.connect(masterGain);
  car.start(); lfo.start();
  sirenNodes.push(car, lfo, lfoG, gain);

  let t0 = null;
  function tick(ts) {
    if (!t0) t0 = ts;
    flashLights(((ts - t0) % 286) < 143);
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

// ── HORN ───────────────────────────────────────────────────
function startHorn() {
  if (hornOn) return; hornOn = true;
  ensureCtx();
  const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
  const g  = ctx.createGain();
  o1.type = 'sawtooth'; o1.frequency.value = 440;
  o2.type = 'sawtooth'; o2.frequency.value = 554;
  g.gain.value = 0.65;
  o1.connect(g); o2.connect(g); g.connect(masterGain);
  o1.start(); o2.start();
  hornNodes.push(o1, o2, g);
  document.getElementById('hornBtn').classList.add('pressed');
}
function stopHorn() {
  if (!hornOn) return; hornOn = false;
  killNodes(hornNodes);
  document.getElementById('hornBtn').classList.remove('pressed');
}

// ── LIGHTS ─────────────────────────────────────────────────
const pods  = Array.from(document.querySelectorAll('.lb-pod'));
const veil  = document.getElementById('flashVeil');
let lastPhase = null;

function flashLights(leftOn) {
  if (leftOn === lastPhase) return;
  lastPhase = leftOn;
  pods.forEach((p, i) => {
    p.classList.toggle('on-blue', leftOn ? i < 5 : i >= 5);
  });
  veil.style.opacity = '1';
  requestAnimationFrame(() => { veil.style.opacity = '0'; });
}

function lightsOff() {
  lastPhase = null;
  pods.forEach(p => p.classList.remove('on-blue'));
  veil.style.opacity = '0';
}

// ── CONTROLS ───────────────────────────────────────────────
function toggleSiren() {
  sirenOn = !sirenOn;
  const btn   = document.getElementById('sirenBtn');
  const pill  = document.getElementById('sPill');
  const sub   = document.getElementById('sirenSub');
  btn.classList.toggle('on', sirenOn);
  pill.classList.toggle('live', sirenOn);
  pill.textContent = sirenOn ? 'AKTIV' : 'STANDBY';
  sub.textContent  = sirenOn ? '● AKTIV' : '● INAKTIV';
  sirenOn ? startSiren() : stopSiren();
}

const modeNames = { hilo:'HI-LO', wail:'WAIL', yelp:'YELP', phaser:'PHASER' };

function selectMode(mode, el) {
  curMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('sMode').textContent = modeNames[mode];
  if (sirenOn) { stopSiren(); startSiren(); }
}

function setVol(v) {
  vol = v / 100;
  document.getElementById('volVal').textContent = v + '%';
  document.getElementById('sVol').textContent   = 'VOL ' + v + '%';
  if (masterGain) masterGain.gain.value = vol;
}

// ── HORN EVENTS ────────────────────────────────────────────
const hb = document.getElementById('hornBtn');
hb.addEventListener('mousedown',   startHorn);
hb.addEventListener('touchstart',  e => { e.preventDefault(); startHorn(); }, { passive: false });
hb.addEventListener('mouseup',     stopHorn);
hb.addEventListener('mouseleave',  stopHorn);
hb.addEventListener('touchend',    stopHorn);
hb.addEventListener('touchcancel', stopHorn);
</script>
</body>
</html>
